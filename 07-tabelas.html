<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas em HTML 5</title>
</head>
<body>
    <h1>Tabelas em HTML 5</h1>
    <table border="1">
        <tr>
            <th>Nome</th>
            <th>Idade</th>
            <th>Cidade</th>
        </tr>
        <tr>
            <td>Ana</td>
            <td>25</td>
            <td>São Paulo</td>
        </tr>
        <tr>
            <td>Bruno</td>
            <td>30</td>
            <td>Rio de Janeiro</td>
        </tr>
        <tr>
            <td>Carla</td>
            <td>28</td>
            <td>Belo Horizonte</td>
        </tr>
        <tr>Anthony</tr>
            <td>Anthony</td>
            <td>35</td>
            <td>Salvador</td>
        </tr>
        <tr>Beatriz</tr>
            <td>Beatriz</td>
            <td>27</td>
            <td>Fortaleza</td>
        </tr>
        <tr>Arthur</tr>
            <td>Arthur</td>
            <td>32</td>
            <td>Curitiba</td>
        </tr>
        <tbody>

            <tfoot>
                <tr>
                    <td colspan="2"><strong>Total de Pessoas</strong></td>
                    <td><strong>6</strong></td>
                </tr>
            </tfoot>
        </tbody>
    </table>
</body>
</html>
