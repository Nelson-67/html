<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>listas em HTML 5</title>
</head>
<body>
    <h1>listas em HTML 5</h1>
    <h3>Lista nao Ordenada</h3>
    <ul>
        <li>Pão</li>
        <li>Leite</li>
        <li>Ovos</li>
        <li>Arroz</li>
    </ul>

    <h3>Lista Ordenada</h3>
    <ol>
        <li>Pão</li>
        <li>Leite</li>
        <li>Ovos</li>
        <li>Arroz</li>
    </ol>
</body>
</html>
